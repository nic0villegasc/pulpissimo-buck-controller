# Generic FT2232H (Channel A) for PULPissimo on ZedBoard

# Use the modern 'adapter driver' command
adapter driver ftdi

# Use the modern 'transport select' command
transport select jtag

# Remove 'ftdi_' prefix
ftdi vid_pid 0x0403 0x6010

# Remove 'ftdi_' prefix
ftdi channel 0

# Remove 'ftdi_' prefix
ftdi layout_init 0x0000 0x000b

source openocd-zedboard-common.cfg