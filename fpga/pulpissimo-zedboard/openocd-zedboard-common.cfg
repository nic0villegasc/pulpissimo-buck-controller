reset_config none

# Use 'adapter speed' instead of 'adapter_khz'
adapter speed 1000

set _CHIPNAME riscv

# JTAG tap for the debug module (dm)
jtag newtap $_CHIPNAME dm -irlen 5 -expected-id 0x10102001

# JTAG tap for the RI5CY core
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x249511c3

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME -coreid 0

# Use modern GDB command syntax
gdb report_data_abort enable
gdb report_register_access_error enable

riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120

# Replace 'set_prefer_sba' with the modern 'set_mem_access' command
#riscv set_mem_access sba

# dump jtag chain
scan_chain

init
halt
echo "Ready for Remote Connections"